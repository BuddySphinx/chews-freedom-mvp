<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Chews Freedom Whimsical Family Sketch sample</title>
  <desc id="desc">A warm hand-drawn family scene: four players arrange food around a tilted wooden table and help patients meet their limit together.</desc>
  <defs>
